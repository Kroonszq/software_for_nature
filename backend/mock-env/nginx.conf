server {
    listen 8080;
    server_name mock-data;
    root /mock-data;

    charset utf-8;

    # ---------------------------------------------------------
    # 1. LEGACY TSD SYSTEM (Filtered API)
    # ---------------------------------------------------------
    location ~ ^/tsdws/filtered/1/(.*)/query$ {
        set $base_path $1;
        set $agg $arg_aggregatefunctioncriteria;
        set $group $arg_groupbyseconds;

        # Defaults if client omits them
        if ($agg = "") { 
            set $agg "RAW"; 
        }
        if ($group = "") { 
            set $group "0"; 
        }
        try_files /legacy-tsd/$base_path/query_${agg}_${group}.json =404;
    }

    # Matches Legacy Discovery (e.g., /nets, /nodes, /channels)
    location ~ ^/tsdws/filtered/1/(.*)$ {
        try_files /legacy-tsd/$1.json /legacy-tsd/$1/index.json =404;
    }

    # ---------------------------------------------------------
    # 2. SYSTEM MONITORING (DMX Webserver)
    # ---------------------------------------------------------
    location = /dmx_ws/php/getList.php {
        set $type $arg_dmxType;
        try_files /system-monitor/list_${type}.json =404;
    }

    location = /dmx_ws/php/getTimeseries.php {
        set $title $arg_title;
        try_files /system-monitor/uptime_${title}.json =404;
    }

    # ---------------------------------------------------------
    # 3. SEISMOLOGICAL: FDSNWS (Dataselect & Station)
    # ---------------------------------------------------------
   location = /fdsnws/dataselect/1/query {
        set $net $arg_network;
        set $sta $arg_station;
        add_header Content-Type application/vnd.fdsn.mseed;
        
        try_files /seismic/dataselect_${net}_${sta}.mseed =404;
    }

    # Station returns XML metadata
    location = /fdsnws/station/1/query {
        set $net $arg_network;
        set $sta $arg_station;
        add_header Content-Type application/xml;
        
        try_files /seismic/station_${net}_${sta}.xml =404;
    }

    location = /fdsnws/event/1/query {
        set $catalog $arg_catalog;
        
        try_files /seismic/${catalog}.xml =404;
    }

    # ---------------------------------------------------------
    # 4. SEISMOLOGICAL: SUDS Archive
    # ---------------------------------------------------------
    location = /suds/repoFile/query {
        set $yr $arg_year;
        set $mo $arg_month;
        set $day $arg_day;
        set $tme $arg_time;
        add_header Content-Type application/octet-stream;

        try_files /seismic/suds_${yr}_${mo}_${day}_${tme}.dmx =404;
    }

    # ---------------------------------------------------------
    # 5. MULTIMEDIA ARCHIVES (Video & Image)
    # ---------------------------------------------------------
    # Video List
    location = /video/FileList/query$ {
        set $sta $arg_stName;
        try_files /multimedia/video_list.json =404;
    }

    location = /video/StationList/query$ {
        set $sta $arg_stName;
        try_files /multimedia/station_list.json =404;
    }

    # Camera List video archive
    location = /VideoArchive/resources/cameras.json {
        try_files /multimedia/cameras.json =404;
    }

    # Video Binary (AVI)
    location = /video/VideoFile/query {
        set $sta $arg_stName;
        set $yr $arg_year;
        set $mo $arg_month;
        set $dy $arg_day;
        set $time $arg_time;

        set $filename "${sta}_${yr}${mo}${dy}-${time}.avi";
        
        add_header Content-Type video/x-msvideo;
        add_header Content-Disposition 'attachment; filename="$filename"';
        
        try_files /multimedia/avi/${sta}_${yr}${mo}${dy}-${time}.avi =404;
    }

    # Image Index
    location = /tsdws/imageArchive/index.php {
        set $cam $arg_camera;
        try_files /multimedia/image_index_${cam}.json =404;
    }

    # Raw Images
    location = /tsdws/imageArchive/php/getCameras.php {
        try_files /multimedia/image_cameras_list.json =404;
    }

    location /pics/ {
        # Serves directly from /mock-data/pics/
        try_files $uri =404;
    }

    # ---------------------------------------------------------
    # 8. NEW TSD SYSTEM (REST API)
    # ---------------------------------------------------------
    location ~ ^/tsdws/timeseries/.*/values$ {
        set $id $arg_id;
        set $aggregate $arg_aggregate;
        set $time_bucket $arg_time_bucket;
        try_files "/new-tsd/$id/values_${aggregate}_${time_bucket}.json" "/new-tsd/$id/values_${aggregate}.json" /new-tsd/timeseries.json =404;
    }

    location ~ ^/tsdws/(.*)$ {
        try_files /new-tsd/$1.json /new-tsd/$1/index.json =404;
    }

    # ---------------------------------------------------------
    # 8. FALLBACK ROUTE
    # ---------------------------------------------------------
    location / {
        try_files $uri $uri.json $uri/index.json =404;
    }
}